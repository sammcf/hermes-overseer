overseer:
  poll_interval_seconds: 120
  heartbeat_interval_seconds: 1800
  canary_interval_seconds: 180
  canary_stale_threshold_seconds: 3600
  data_dir: "/var/lib/hermes-overseer"
  secrets_dir: "~/.config/hermes-overseer"
  patches_dir: "~/.config/hermes-overseer/patches"

backup:
  interval_seconds: 14400            # 4 hours
  retention_count: 4                 # keep most recent 4 snapshots
  dir: "~/.local/share/hermes-overseer/backups"
  extra_paths:                       # paths relative to hermes user home, captured alongside hermes_home/
    - ".claude.json"                 # Claude Code OAuth identity
    - ".claude/.credentials.json"    # Claude Code long-lived token
    - ".Brewfile"                    # Homebrew package list (regenerated before each snapshot)
    - ".bashrc"                      # PATH shims, brew shellenv, user customisations
    - ".bash_profile"                # login-shell companion to .bashrc
    - ".profile"                     # POSIX fallback
    - ".gitconfig"                   # git identity and aliases
    - ".config/gh"                   # GitHub CLI auth
    - ".local/share/qmd"            # qmd collection configs and embeddings
    - ".cache/qmd"                   # GGUF embedding model (~300MB, avoids re-download)

vps:
  server_id: 592953
  tailscale_hostname: "hermes-vps"
  ssh_user: "hermes"
  hermes_home: "/home/hermes/.hermes"
  base_image_id: "ubuntu-24.04"
  tailscale_auth_key_env: "TS_HERMES_AUTH_KEY"
  tailscale_api_key_env: "TS_API_KEY"
  tailscale_tailnet: "-"
  ssh_public_key_path: "~/.ssh/id_ed25519.pub"
  terminfo_sources: []           # e.g. ["deploy/xterm-ghostty.terminfo"]

binarylane:
  api_token_env: "BL_API_TOKEN"
  base_url: "https://api.binarylane.com.au"
  max_retries: 5

alerts:
  telegram:
    bot_token_env: "OVERSEER_TG_BOT_TOKEN"
    dm_chat_id: "123456789"
    group_chat_id: "-1001234567890"  # optional; heartbeats + yellow/orange alerts go here
  email:
    smtp_host: "smtp.gmail.com"
    smtp_port: 587
    from_address: "overseer@example.com"
    to_address: "operator@example.com"
    password_env: "OVERSEER_EMAIL_PASSWORD"

monitor:
  watched_files:
    orange_on_any_diff:
      - ".env"
      - "config.yaml"
      - "google_token.json"
      - "google_client_secret.json"
    orange_on_suspicious_diff:
      - "SOUL.md"
      - "memories/MEMORY.md"
      - "memories/USER.md"
      - "personas/GESTALT.md"
      - "personas/GUARDIAN.md"
      - "personas/LIBRARIAN.md"
      - "personas/ORGANISER.md"
      - "personas/VOICE.md"
      - "personas/WITNESS.md"
      - "personas/taxonomy.json"
    yellow_on_any_diff:
      - "auth.json"    # Nous + Codex OAuth tokens (refresh expected but want visibility)
    yellow_on_new_file:
      - "skills/"

  connection_allowlist:
    # Core — always needed
    - "openrouter.ai"
    - "api.openrouter.ai"
    - "api.anthropic.com"
    - "api.openai.com"
    - "generativelanguage.googleapis.com"
    - "api.telegram.org"
    - "imap.gmail.com"
    # Tailscale — control plane + DERP relays
    - "login.tailscale.com"
    - "controlplane.tailscale.com"
    - "derp1.tailscale.com"
    - "derp2.tailscale.com"
    - "derp3.tailscale.com"
    - "derp4.tailscale.com"
    - "derp5.tailscale.com"
    - "derp6.tailscale.com"
    - "derp7.tailscale.com"
    - "derp8.tailscale.com"
    - "derp9.tailscale.com"
    - "derp10.tailscale.com"
    - "derp11.tailscale.com"
    - "derp12.tailscale.com"
    # Container registries + code hosting
    - "registry-1.docker.io"
    - "ghcr.io"
    - "github.com"
    - "api.github.com"
    # Nous Research — portal + inference
    # - "portal.nousresearch.com"
    # - "inference-api.nousresearch.com"
    # Email — SMTP outbound
    # - "smtp.gmail.com"
    # Likely needed — enable per use case
    # - "firecrawl.dev"
    # - "api.browserbase.com"
    # - "fal.ai"
    # - "elevenlabs.io"
    # - "app.honcho.dev"
    # - "discord.com"

  sustained_unknown_threshold: 3

  session_thresholds:
    window_hours: 6
    inactivity_alert_hours: 24
    max_tool_calls_per_session: 200
    max_tokens_per_window: 2000000
    max_session_duration_hours: 8.0

  token_budget:
    window_hours: 6
    warn_tokens: 1000000
    critical_tokens: 3000000

cost:
  providers:
    openrouter:
      type: "prepaid_wallet"
      yellow_remaining_usd: 10.0
      orange_remaining_usd: 5.0
    anthropic:
      type: "rolling_window"
      yellow_percent: 50
      orange_percent: 80
    openai:
      type: "rolling_window"
      yellow_percent: 50
      orange_percent: 80
    gemini:
      type: "rolling_window"
      yellow_percent: 50
      orange_percent: 80

  canonical_hermes_config: "config/hermes-canonical.yaml"
  dispatch_policy_fields:
    - "model.default"
    - "model.provider"
    - "toolsets"
    - "mcp_servers"

response:
  yellow:
    actions: ["alert"]
  # TODO: add "rebuild" to orange once false positives are validated over several clean poll cycles
  orange:
    actions: ["alert"]
  red:
    actions: ["alert", "rebuild"]

api:
  enabled: false          # set to true once OVERSEER_API_TOKEN is configured
  host: "0.0.0.0"        # listen on all interfaces (Tailscale ACL provides network auth)
  port: 8900
  bearer_token_env: "OVERSEER_API_TOKEN"

hermes_secrets:
  env_mapping:
    OPENROUTER_API_KEY: "OPENROUTER_API_KEY"
    TELEGRAM_BOT_TOKEN: "TELEGRAM_BOT_TOKEN"
    TELEGRAM_ALLOWED_USERS: "TELEGRAM_ALLOWED_USERS"
    FIRECRAWL_API_KEY: "FIRECRAWL_API_KEY"
  file_secrets:
    google_token.json: "google_token.json"
    google_client_secret.json: "google_client_secret.json"
